<div *ngIf="isLoading">
  <p>Loading...</p>
</div>
<div *ngIf="!isLoading && properties.length === 0">
  <p>No proporties found.</p>
</div>
<div
  *ngIf="!isLoading && properties.length > 0"
  class="row row-cols-1 row-cols-md-4 g-4"
>
  <div class="col-md-6 col-lg-3" *ngFor="let item of properties">
    <!-- <a href="#"> -->
    <app-property-item [property]="item"></app-property-item>
    <!-- </a> -->
  </div>
</div>
