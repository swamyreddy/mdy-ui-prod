<div class="container">
  <div class="row">
    <div class="col">
      <div class="relative mt-5 mb-5">
        <div class="row">
          <div class="col-md-12 col-md-offset-3">
            <h2 *ngIf="isLogin">Sign In</h2>
            <h2 *ngIf="!isLogin">Sign Up</h2>
            <app-loading *ngIf="isLoading"></app-loading>
            <div *ngIf="!isLoading">
              <form #authForm="ngForm" (ngSubmit)="onSubmit(authForm)">
                <div class="form-group mb-3" *ngIf="!isLogin">
                  <label for="name">Name</label>
                  <input
                    type="text"
                    id="name"
                    class="form-control"
                    ngModel
                    required
                    name="name"
                  />
                </div>
                <div class="form-group mb-3">
                  <label for="email">Email</label>
                  <input
                    type="text"
                    id="email"
                    class="form-control"
                    ngModel
                    required
                    name="email"
                    minlength="5"
                  />
                </div>
                <div class="form-group mb-3" *ngIf="!isLogin">
                  <label for="phone">Phone</label>
                  <input
                    type="text"
                    id="phone"
                    class="form-control"
                    ngModel
                    required
                    name="phone"
                    minlength="5"
                  />
                </div>
                <div class="form-group mb-3">
                  <label for="password">Password</label>
                  <input
                    type="password"
                    id="password"
                    ngModel
                    minlength="6"
                    required
                    class="form-control"
                    name="password"
                  />
                </div>
                <div>
                  <button
                    class="btn btn-primary"
                    type="submit"
                    [disabled]="!authForm.valid"
                  >
                    Submit
                  </button>
                </div>
              </form>
            </div>
            <div *ngIf="isLogin">
              Don't have an account?
              <a href="javascript:void()" (click)="isLogin = false">Register</a>
            </div>
            <div *ngIf="!isLogin">
              Already have an account?
              <a href="javascript:void()" (click)="isLogin = true">Login</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
